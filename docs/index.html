<head>
  <meta charset="UTF-8">

  <!-- name="viewport" → 「ビューポート（表示領域）」に関する設定 -->
  <!-- width=device-width → ページの横幅を「その端末の画面幅」に合わせる。-->
  <!-- initial-scale=1.0 → ページを読み込んだときの拡大率を「1倍」にする。-->

  <title>index-pomodoro-timer-mvp-v2.5</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* 簡易メニューのスタイル */
    .menu-bar {
      display: none;
      position: absolute;
      top: 50px;
      left: 10px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .menu-bar.open {
      display: block;
    }

    .menu-bar a {
      display: block;
      margin: 5px 0;
      text-decoration: none;
      color: #333;
    }
  </style>

</head>

<body>

  <header>
    <div class="header-left">

    </div>
  </header>

  <main>
    <h2>POMODORO TIMER</h2>
    <div class="timer-wrapper">
      <svg id="timer-svg" viewBox="0 0 100 100" width="200" height="200">
        <circle cx="50" cy="50" r="45" stroke="#333" stroke-width="8" fill="none" />
        <circle id="progress-circle" cx="50" cy="50" r="45" stroke="#00ffcc" stroke-width="8" fill="none"
          stroke-linecap="round" transform="rotate(-90 50 50)" />
      </svg>
      <div class="timer-overlay">
        <output id="timer-container"></output>
        <p id="session-status" aria-live="polite">作業開始</p>
      </div>
    </div>

    <button id="reset-btn">&#10005;</button>
    <button id="control-btn">&#9654;</button>

    <p id="pomodoro-count">現在 0 ポモドーロ完了！</p>

  </main>





  <script src="js/timer.js"></script>
