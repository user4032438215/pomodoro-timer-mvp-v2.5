<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>setting-pomodoro-timer-mvp-v2</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div class="header-left header-links">
      <a href="index.html" class="" aria-label="戻る">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 6 9 12 15 18" />
        </svg>
      </a>
    </div>

    <h2>設定</h2>

    <div class="header-right header-links">

    </div>
  </header>

  <main class="main-container">
    <div class="settings-container">
      <form id="settings-form" class="settings-form">
        <table>

          <tr>
            <td>作業時間</td>
            <td><input type="number" id="work-duration-input" min="1" max="60" value="2" required></td>
            <td>分</td>
          </tr>

          <tr>
            <td>休憩時間</td>
            <td><input type="number" id="break-duration-input" min="1" max="60" value="1" required></td>
            <td>分</td>
          </tr>

          <tr>
            <td>長休憩時間</td>
            <td><input type="number" id="long-break-duration-input" min="1" max="60" value="3" required></td>
            <td>分</td>
          </tr>

          <tr>
            <td>長休憩の頻度</td>
            <td><input type="number" id="long-break-frequency-input" min="1" max="60" value="3" required></td>
            <td>ポモドーロにつき１回</td>
          </tr>
        </table>


        <div class="form-btns">
          <button class="submit-btn" type="submit">保存</button>
        </div>

      </form>


    </div>
  </main>

  <script src="js/setting.js"></script>
</body>

</html>
